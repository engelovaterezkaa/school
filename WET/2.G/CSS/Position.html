<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Position</title>
    <style>
.ctverec{
    border: 2px solid black;
    width: 100px;
    aspect-ratio: 1/1;
    margin: 5px;
}

#prvni {
    position: absolute;
    background-color: rgb(125, 125, 219);
    right:5%;
}

#druhy {
    position: absolute;
    background-color: rgb(231, 159, 204);
    bottom: 5%;
    right: 5%;

}

#treti{
    position: absolute;
    background-color: rgb(127, 255, 185);
    left: 5%;
    bottom: 5%;
}

#ctvrty{
    position: relative;
    background-color: rgb(212, 169, 252);
    left: 50%;
  
}
    </style>
</head>
<body>
    <div class="ctverec" id="prvni">1.</div>
    <div class="ctverec" id="druhy">2.</div>
    <div class="ctverec" id="treti">3.</div>
    <div class="ctverec" id="ctvrty">4.</div>
</body>
</html>
