<!DOCTYPE html>
<html lang="cs">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Document</title>
    </head>
    <body>
        <script>

            let i = 0

            while (i < 6) {
                console.log(i)
                i++
            }

            //kdyz vime dopredu kolikrat se to deje pouzivame for misto while, stejne

            for (let i = 0; i < 6; i++) {
                console.log(i)
            }

            //je to jen lokalne (i apod)
        </script>
    </body>
</html>
