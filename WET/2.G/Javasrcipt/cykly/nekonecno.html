    <body>
        <script>
            let i = 0

            while (true) {
                //true=zapinani cyklu
                console.log("Aaa")
                if (i >= 9) {
                    break //kdyz je vetsi nebo rovno 9=preruseni cyklu
                    //provede jednou a pak se cyklus prerusi
                    //PAMATOVAT BREAK
                }
                i++
            }
        </script>
