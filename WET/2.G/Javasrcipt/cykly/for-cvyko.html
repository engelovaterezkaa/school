<!DOCTYPE html>
<html lang="cs">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Document</title>
    </head>
    <body>
        <script>

            for (let i = 0; i < 10; i++) {
                console.log("houuu")
            }

            for (let l = 20; l >= 1; l--) {
                console.log(l)
            }

            for (let m = 0; m < 3; m++) {
                console.log("****")
            } //v consoli v js se normalne vypise

            for (let n = 0; n < 5; n++) {
                console.log("*")
            }

            for (let o = 0; o < 3; o++) {
                for (let p = 0; p < 3; p++) {
                    console.log("*")
                }
                console.log("-------")
            }
        </script>
    </body>
</html>
