<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
    <title>Document</title>

    <style>
        .wrapper{
            display: flex; /*zmensuje objekt kdyz zmensime okno*/
            /*inline-block: zarovnava pod sebe pri zmenseni okna*/
            flex-wrap: wrap; /*zacnou se zarovnavat pod sebe*/
        }

        h1{
            /*font-size: 6rem; hlavne na pismo:: REM*/
            font-size: clamp(1.5rem, 6vw, 4rem); /*(optimalni hodkota uprostred (6vw: %), vpravo je max, vlevo min)*/
        }

        .obdelnik1{
            width: 300px;
            height: 100px;
            border: 2px solid pink;
            margin: 10px;
            background-color:blue
        }

        .obdelnik2{
            width: 300px;
            height: 100px;
            border: 2px solid pink;
            margin: 10px;
            background-color: green;
        }

        .obdelnik3{
            width: 300px;
            height: 100px;
            border: 2px solid pink;
            margin: 10px;
            background-color: aqua;
        }


        @media (width < 1200px) {
            h1 {
                color:magenta
            }

            .obdelnik1 {
                background-color:red
            }
            .obdelnik2 {
               background-color: black;
            }
            .obdelnik3 {
               background-color: purple;
            }
        }

        @media (width < 800px) {
            h1 {
                color:lightblue
            }

            
            .obdelnik1 {
                background-color:yellow
            }
            .obdelnik2 {
               background-color: orange;
            }
            .obdelnik3 {
               background-color: pink;
            }
        }

        /* @media (odkdy) {
            jak bude vypadat css kdyz se zmeni:: CSS
        } */


    </style>
</head>
<body>
    <div class="wrapper">
        <h1>Mam rymu a zadny kapicky do nosu :((</h1>
        <div class="obdelnik1"></div>
        <div class="obdelnik2"></div>
        <div class="obdelnik3"></div>
    </div>
</body>
</html>
