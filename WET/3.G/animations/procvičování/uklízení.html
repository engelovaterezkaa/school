<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Protest+Guerrilla&family=Schibsted+Grotesk:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">
    <style>
        body{
            display: flex;
            justify-content: center;
        }

        .house{
            height: 600px;
            width: 500px;
            border: 4px solid red;
        }

        .broom{
            height: 150px;
            position: absolute;
            animation: animation_broom 3s infinite alternate, animation_broom2 2s infinite alternate;
        }

        .roof{
            border-bottom: 80px solid red;
	        border-left: 25px solid transparent;
	        border-right: 25px solid transparent;
            position: absolute;
	        height: 0;
	        width: 505px;
            display: flex;
            justify-content: center;
        }

        .cat{
            height: 605px;
            width: 500px;
            position: absolute;
        }

        
        .cat2{
            height: 605px;
            width: 500px;
            position: absolute;
        }

        .text{
            color: aliceblue;
            font-family: "Protest Guerrilla", serif;
        }

        @keyframes animation_broom{
            0%{
                translate: 200px 50px;
            }
            30%{
                translate: 200px 480px;
            }
            60%{
                translate: -200px 480px;
            }
            80%{
                translate: -200px 50px;
            }
            100%{
                translate: -200px 50px;
            }


        }

        @keyframes animation_broom2{
            0%{
                rotate: 0deg;
            }
            10%{
                rotate: -60deg;
            }
            20%{
                rotate: 0deg;
            }
            30%{
                rotate: -60deg;
            }
            40%{
                rotate: 0deg;
            }
            60%{
                rotate: -60deg;
            }
            70%{
                rotate: 0deg;
            }
            80%{
                rotate: -60deg;
            }
            90%{
                rotate: 0deg;
            }
            100%{
                rotate: -60deg;
            }
        }
    </style>


</head>
<body>
    <img class="cat" onclick="change()" src="cat1.jpg" alt="">
    
    <div class="roof">
        <h1 class="text">The Clean House Třebešín</h1>
    </div>
    <div class="house"></div> 
    <img class="broom" src="https://pnghq.com/wp-content/uploads/broom-png-transparent-image-download-transparent-background.png" alt="">

    <script> 
        let cat = document.querySelector(".cat");
        let cat2 = document.querySelector(".cat2");
        let zmena = false;

        function change(){
           if (zmena === true) {
                cat.src = "cat.jpg";
            } else {
                cat.src = "cat1.jpg";
            }

            zmena = !zmena;
            console.log(zmena)

        }
        
        // cat.addEventListener("click", function() {
        //     change();
        // })

    </script>
</body>
</html>
