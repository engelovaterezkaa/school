<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products Synaptech</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300..700&display=swap" rel="stylesheet">

    <style>
        body{
            font-family: "Quicksand";
            color: aliceblue;
        }

        .icon{
            position: absolute;
            width: 100%; 
            height: auto; 
            object-fit: cover;  
            z-index: -1; 
        }

        .bulb{
            width: 100px;
            position: absolute;
            top: 0px;
            left: 0px;
        } 

        .wrapper{
            overflow: hidden;
            display: flex;
            justify-content: center;
            position: relative;
            height: 1200px;
            /* border: 2px solid rgb(255, 255, 255); */
        }

        .header{
            font-size: 10vh;
            position: absolute;
            top: 100px;
        }

        .ali{
            height: 300px;
            position: fixed;
            bottom: 0px;
            right: 50px;
        }

        .hidden{
            display: none;
        }

        p{
            position: fixed;
            right: 50px;
            bottom: 320px;
            font-size: 2vh;
        }

        h2{
            font-size: 2vh;
            position: absolute;
            text-align: center;
            top: 400px;
            left: 400px;
        }
    </style>
</head>
<body>
    <img class="bulb" src="utility/photos/light_bulb.png" alt="">
    <img class="icon" src="utility/photos/red lightbulb.jpg" alt="">

    <div class="wrapper">
        <h1 class="header">Products</h1>
        <img class="ali" src="utility/photos/Ali_reccomends.png" alt="">
        <p class="reccomend hidden">Ali recommends to support us! You can do so by giving the creator an additional grade!</p>

        <h2>Our dearest apologies, the company is going bankrup. For any inconviniences caused by this issue, please slide your cursor to Ali</h2>
    </div>

    <script>
        let ali_reccomends = document.querySelector(".ali")
        let text = document.querySelector(".reccomend")


    ali_reccomends.addEventListener("mouseover", function() {
        text.classList.remove("hidden")
    })

    ali_reccomends.addEventListener("mouseout", function() {
        text.classList.add("hidden")
    })
    </script>
</body>
</html>
