<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Async ukázka</title>
</head>
<body>
    <script>
        const api = "https://catfact.ninja/fact"

        async function fetchData(api) {
            try {
            const response = await fetch(api)

            if (!response.ok) {
                throw Error("Something's wrong dumbass")
            }

            return await response.json()
            } catch (error) {
                console.log("Error", error)
            }
        }

        async function showData() {
            const catFact = await fetchData(api)

            if (catFact) {
                console.log(catFact.fact)
            }
        }

        showData()
    </script>
</body>
</html>
